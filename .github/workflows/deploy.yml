name: Deploy to HostPanel
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: Developer-Geekay/hostpanel-package-nodejs/.github/workflows/node-deploy.yml@main
    with:
      app_id: gokul-portfolio-gokulakannan-dev
      install_cmd: npm ci && npm install --no-save lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu
      build_cmd: npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public && cp -r content data .next/standalone/
      artifact_paths: .next/standalone
      entrypoint: standalone/server.js
    secrets:
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}